name: Repo Health

on:
  schedule:
    - cron: "0 10 * * 1"  # Monday 10 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "## Repo Health Report" > report.md
          echo "" >> report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> report.md
          echo "" >> report.md

          # Check README exists and has content
          if [ ! -f README.md ]; then
            echo "- ❌ README.md is missing" >> report.md
          elif [ $(wc -c < README.md) -lt 100 ]; then
            echo "- ❌ README.md is suspiciously small (< 100 bytes)" >> report.md
          else
            echo "- ✅ README.md exists ($(wc -c < README.md) bytes)" >> report.md
          fi

          # Check AGENTS.md exists
          if [ ! -f AGENTS.md ]; then
            echo "- ❌ AGENTS.md is missing" >> report.md
          else
            echo "- ✅ AGENTS.md exists" >> report.md
          fi

          # Check profile SVGs exist
          SVG_COUNT=$(ls -1 profile-3d-contrib/*.svg 2>/dev/null | wc -l)
          if [ "$SVG_COUNT" -eq 0 ]; then
            echo "- ❌ No SVG files in profile-3d-contrib/" >> report.md
          else
            echo "- ✅ $SVG_COUNT SVG files in profile-3d-contrib/" >> report.md
          fi

          # Check workflows exist
          for wf in profile-3d.yml link-check.yml stale.yml repo-health.yml; do
            if [ ! -f ".github/workflows/$wf" ]; then
              echo "- ❌ Missing workflow: $wf" >> report.md
            else
              echo "- ✅ Workflow: $wf" >> report.md
            fi
          done

          # Check SVG freshness (should be < 48 hours old)
          NEWEST_SVG=$(find profile-3d-contrib -name "*.svg" -exec stat -f "%m" {} \; 2>/dev/null | sort -rn | head -1)
          NOW=$(date +%s)
          if [ -n "$NEWEST_SVG" ]; then
            AGE_HOURS=$(( (NOW - NEWEST_SVG) / 3600 ))
            if [ "$AGE_HOURS" -gt 48 ]; then
              echo "- ⚠️ Newest SVG is ${AGE_HOURS}h old (profile-3d workflow may be failing)" >> report.md
            else
              echo "- ✅ SVGs are fresh (${AGE_HOURS}h old)" >> report.md
            fi
          fi

          echo "" >> report.md
          echo "---" >> report.md
          echo "Auto-generated by [repo-health.yml](.github/workflows/repo-health.yml)" >> report.md

          cat report.md

      - name: Create issue on problems
        if: contains(steps.*.outputs.*, '❌')
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Repo health check found issues"
          content-filepath: ./report.md
          labels: maintenance
