name: Generate Snake

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: cschanhniem
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_snake=7aa2f7&color_dots=#0d1117,#1a1b26,#7aa2f7,#565f89,#414868

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
